name: Notify assistant corpus sync

on:
  push:
    branches: [main]
    paths:
      - src/data/claims.js
      - src/data/site.js
      - scripts/generate-public-artifacts.mjs
      - site-public/assistant-corpus.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PORTFOLIO_ASSISTANT_DISPATCH_TOKEN }}
    steps:
      - name: Dispatch immutable source revision
        if: env.GH_TOKEN != ''
        run: |
          gh api --method POST repos/kevinastuhuaman/portfolio-assistant-api/dispatches \
            -f event_type=portfolio_corpus_updated \
            -f "client_payload[source_sha]=$GITHUB_SHA"

      - name: Explain disabled dispatch
        if: env.GH_TOKEN == ''
        run: |
          echo "Corpus dispatch is ready but disabled until the repository-scoped PORTFOLIO_ASSISTANT_DISPATCH_TOKEN is configured." >> "$GITHUB_STEP_SUMMARY"
